name: Release GitHub

permissions: { }

on:
  push:
    branches: [release/*]

jobs:
  create-github-release:
    name: Create GitHub Release and push distribution packages
    runs-on: ubuntu-latest
    environment: Release
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: cucumber/action-create-github-release@cf2c6f77ba35d2424362e83393a1c4c004cf2ddb # v1.1.1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          distribution: 'temurin'
          java-version: '21'
      - run: mvn -DskipTests -Pjreleaser package jreleaser:assemble jreleaser:full-release
        working-directory: java
        env:
          JRELEASER_GITHUB_TOKEN: ${{ secrets.CUKEBOT_MESSAGES_CLI_JRELEASER_TOKEN }}
          JRELEASER_GITHUB_USERNAME: cukebot
