name: test-java

permissions: { }

on:
  push:
    branches:
      - main
      - renovate/**
    paths:
      - java/**
      - testdata/**
      - .github/**
  pull_request:
    branches:
      - main
    paths:
      - java/**
      - testdata/**
      - .github/**

jobs:
  test-java:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os:
          - ubuntu-latest
        java: [ '21']

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java }}
          cache: 'maven'

      - name: Maven Test
        run: mvn test
        working-directory: java

      - name: JReleaser Assembly - Build
        run: mvn -Pjreleaser package jreleaser:assemble
        working-directory: java

      - name: JReleaser Assembly - Test Standalone
        run: |
          # Test 
          ./target/jreleaser/assemble/cucumber-messages-standalone/jlink/work-linux-x86_64/cucumber-messages-*-linux-x86_64/bin/cucumber-messages --help
          ./target/jreleaser/assemble/cucumber-messages-standalone/jlink/work-linux-x86_64/cucumber-messages-*-linux-x86_64/bin/cucumber-messages cucumber-json ../testdata/compatibility-kit/src/minimal.ndjson
        working-directory: java

      - name: JReleaser Assembly - Test Java Binary
        run: |
          ./target/jreleaser/assemble/cucumber-messages/java-archive/work/cucumber-messages-*-SNAPSHOT/bin/cucumber-messages --help
          ./target/jreleaser/assemble/cucumber-messages/java-archive/work/cucumber-messages-*-SNAPSHOT/bin/cucumber-messages cucumber-json ../testdata/compatibility-kit/src/minimal.ndjson
        working-directory: java
