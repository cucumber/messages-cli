project:
  name: cucumber-messages
  description: Cucumber Messages CLI
  longDescription: A commandline interface to work with Cucumber Messages
  links:
    homepage: https://github.com/cucumber/messages-cli
  authors:
    - M.P. Korstanje
  license: MIT AND Apache-2.0
  inceptionYear: '2025'
  stereotype: CLI
  tags:
    - 'cucumber'
    - 'messages'
    - 'cli'
  languages:
    java:
      version: '21'
      groupId: io.cucumber
      artifactId: messages-cli
      mainClass: io.cucumber.messages.cli.CucumberMessagesCli
      mainModule: io.cucumber.messages.cli

environment:
  properties:
    jdkPathPrefix: 'target/jdks'
    jdkFilePrefix: 'jdk-21+35'
    assemblyDir: 'target/jreleaser/assemble'

assemble:
  jlink:
    messages-cli:
      active: ALWAYS
      imageName: '{{distributionName}}-{{projectVersion}}'
      targetJdks:
        - path: '{{jdkPathPrefix}}/temurin-21-linux-x86_64/{{jdkFilePrefix}}'
          platform: 'linux-x86_64'
          extraProperties:
            archiveFormat: TAR_GZ
      mainJar:
        path: 'target/{{distributionName}}-{{projectVersion}}.jar'
      jars:
        - pattern: 'target/dependency/*.jar'
      jdeps:
        multiRelease: '21'
        ignoreMissingDeps: true

release:
  github:
    enabled: true
    owner: cucumber
    name: messages-cli
    # Builds are triggered on tags.
    skipTag: true
    update:
      enabled: true
    # Handled by cucumber/action-create-github-release
    changelog:
      enabled: false


distributions:
  messages-cli:
    type: JLINK
    snap:
      active: RELEASE
      base: core
      localPlugs:
        - home
      architectures:
        - buildOn: [amd64]
          runOn: [amd64]
      repository:
        active: RELEASE
        name: messages-cli-snap
      packageName: cucumber-messages
      remoteBuild: true