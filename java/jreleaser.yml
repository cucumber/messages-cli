project:
  name: Cucumber Messages CLI
  description: A commandline interface for working with Cucumber Messages
  longDescription: |
    Cucumber can output test results in newline delimited json format. This
    format can then be transformed into different reports. 

    This tool supports the conversion of cucumber messages into cucumber-json,
    html, junit-xml and testng-xml reports.

  icons:
    - url: https://cucumber.io/img/logo.svg
      primary: true
      width: 300
      height: 343

  links:
    bugTracker: https://github.com/cucumber/messages-cli
    contact: https://github.com/cucumber/messages-cli
    homepage: https://cucumber.io/
    donation: https://opencollective.com/cucumber

  maintainers:
    - mpkorstanje

  authors:
    - M.P. Korstanje
  license: MIT AND Apache-2.0 AND (GPL-2.0 WITH Classpath-exception-2.0)
  inceptionYear: '2025'
  stereotype: CLI
  tags:
    - 'cucumber'
    - 'messages'
    - 'cli'
  languages:
    java:
      version: '21'
      groupId: io.cucumber
      artifactId: messages-cli
      mainClass: io.cucumber.messages.cli.CucumberMessagesCli
      mainModule: io.cucumber.messages.cli

environment:
  properties:
    jdkPathPrefix: 'target/jdks'
    jdkFilePrefix: 'jdk-21+35'
    assemblyDir: 'target/jreleaser/assemble'
    applicationName: cucumber-messages

assemble:
  javaArchive:
    cucumber-messages:
      active: ALWAYS
      formats:
        - TAR_GZ
      mainJar:
        path: 'target/messages-cli-{{projectVersion}}.jar'
      jars:
        - pattern: 'target/dependency/*.jar'
  jlink:
    cucumber-messages-standalone:
      active: ALWAYS
      imageName: '{{distributionName}}-{{projectVersion}}'
      executable: cucumber-messages
      targetJdks:
        - path: '{{jdkPathPrefix}}/temurin-21-linux-x86_64/{{jdkFilePrefix}}'
          platform: linux-x86_64
        - path: '{{jdkPathPrefix}}/temurin-21-linux-aarch64/{{jdkFilePrefix}}'
          platform: linux-aarch_64
        - path: '{{jdkPathPrefix}}/temurin-21-osx-x86_64/{{jdkFilePrefix}}/Contents/Home'
          platform: osx-x86_64
        - path: '{{jdkPathPrefix}}/temurin-21-osx-aarch64/{{jdkFilePrefix}}/Contents/Home'
          platform: osx-aarch_64
      # Workaround, jreleaser generates but doesn't copy the launcher scripts
      # Custom launcher scripts are needed to follow symlinks (e.g. homebrew)
      artifacts:
        - path: '{{assemblyDir}}/{{distributionName}}/jlink/inputs/bin/cucumber-messages'
          transform: 'bin/cucumber-messages'
      mainJar:
        path: 'target/messages-cli-{{projectVersion}}.jar'
      jars:
        - pattern: 'target/dependency/*.jar'
      jdeps:
        multiRelease: '21'
        ignoreMissingDeps: true
      args:
        - "--no-header-files"
        - "--no-man-pages"

release:
  github:
    enabled: true
    owner: cucumber
    name: messages-cli
    # Builds are triggered on tags.
    skipTag: true
    update:
      enabled: true
    # Handled by cucumber/action-create-github-release
    changelog:
      enabled: false


distributions:
  cucumber-messages:
    snap:
      active: ALWAYS
      base: core20
      localPlugs:
        - home
      architectures:
        - buildOn:
            - amd64
            - arm64
      repository:
        active: RELEASE
        name: messages-cli-snap
      packageName: cucumber-messages
      remoteBuild: true
  cucumber-messages-standalone:
    brew:
      active: ALWAYS
      formulaName: cucumber-messages
      multiPlatform: true
      repository:
        active: RELEASE

